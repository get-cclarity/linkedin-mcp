name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root workspaces
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Test @cclarity-packages/mcp
        run: npm run test --workspace=@cclarity-packages/mcp

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install and build
        run: npm ci && npm run build

      - name: Publish @cclarity-packages/mcp
        run: npm publish --workspace=@cclarity-packages/mcp --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Point cli at registry @cclarity-packages/mcp
        working-directory: packages/cli
        run: |
          MCP_VER=$(node -p "require('../mcp/package.json').version")
          npm pkg set "dependencies.@cclarity-packages/mcp=${MCP_VER}"

      - name: Reinstall workspaces (cli picks published mcp)
        run: |
          rm -rf node_modules packages/cli/node_modules packages/mcp/node_modules
          npm install
          npm run build --workspace=@cclarity-packages/cli

      - name: Publish @cclarity-packages/cli
        run: npm publish --workspace=@cclarity-packages/cli --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
